name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks 📝
    uses: ./.github/workflows/checks.yml

  deploy:
    name: Deploy 🚀
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Mint the OIDC token pnpm exchanges for a short-lived npm token
      # (npm trusted publishing). Replaces the NPM_TOKEN secret.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/prepare
      - uses: ./.github/workflows/actions/type-check-with-cache
      - run: pnpm run build
      - name: Deploy
        run: pnpm run deploy
        env:
          # Emit signed provenance attestations alongside trusted publishing.
          npm_config_provenance: "true"
